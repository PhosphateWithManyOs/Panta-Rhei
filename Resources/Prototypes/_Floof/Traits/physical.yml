- type: trait
  id: LeftBionicPryArm
  name: trait-name-LeftBionicPryArm
  description: trait-description-BionicPryArm
  category: Disabilities
  cost: 2
  conflicts:
  - ArmAmputeeRight
  - ArmAmputeeLeft
  - RightBionicPryArm
  effects:
  - !type:AddCompsEffect
    components:
    - type: Amputee
      removeBodyPart: Arm
      partSymmetry: Left
      protoId: JawsOfLifeLeftArm
      slotId: "left arm"

- type: trait
  id: RightBionicPryArm
  name: trait-name-RightBionicPryArm
  description: trait-description-BionicPryArm
  category: Disabilities
  cost: 2
  conflicts:
  - ArmAmputeeRight
  - ArmAmputeeLeft
  - LeftBionicPryArm
  effects:
  - !type:AddCompsEffect
    components:
    - type: Amputee
      removeBodyPart: Arm
      partSymmetry: Right
      protoId: JawsOfLifeRightArm
      slotId: "right arm"

- type: trait
